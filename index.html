<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Love Across The Universe</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
color:white;
}

/* GALÁXIA */

.galaxy{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#1b2735,#090a0f);
z-index:-2;
}

/* ESTRELAS */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:move linear infinite;
}

@keyframes move{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* ESTRELA CADENTE */

.shooting{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 8s linear infinite;
}

@keyframes shoot{
0%{transform:translate(-10vw,-10vh);opacity:0;}
10%{opacity:1;}
100%{transform:translate(110vw,110vh);opacity:0;}
}

/* URSO */

.bear{
position:fixed;
bottom:10px;
left:-100px;
font-size:50px;
animation:walk 18s linear infinite;
}

@keyframes walk{
0%{left:-100px;}
100%{left:110vw;}
}

/* LOGIN */

.login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,0.7);
padding:40px;
border-radius:15px;
text-align:center;
}

/* LIVRO */

.book{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:420px;
height:260px;
perspective:2000px;
display:none;
}

.page{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.75);
border-radius:10px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:25px;
transition:transform 1s;
transform-origin:left;
backface-visibility:hidden;
}

.page.flipped{
transform:rotateY(-180deg);
}

/* BOTÕES */

button{
padding:10px 20px;
border:none;
border-radius:8px;
margin-top:10px;
cursor:pointer;
}

.sim{
background:white;
color:#ff4f7b;
}

.nao{
background:#333;
color:white;
}

</style>
</head>

<body>

<div class="galaxy"></div>
<div class="shooting"></div>
<div class="bear">🧸</div>

<!-- LOGIN -->

<div class="login" id="login">

<h2>Área secreta 🔒</h2>

<p>Digite a senha</p>

<input type="password" id="senha">

<br><br>

<button onclick="entrar()">Entrar</button>

</div>

<!-- LIVRO -->

<div class="book" id="book">

<div class="page" id="p1">

<h2>Love Across The Universe 💫</h2>

<p>
Entre bilhões de estrelas,<br>
entre bilhões de caminhos,<br>
meu destino sempre seria você.
</p>

<p>
Você é o meu universo inteiro.
</p>

<button onclick="virar()">Continuar</button>

</div>

<div class="page" id="p2">

<h2>Agora uma pergunta ❤️</h2>

<p>Você quer continuar sendo minha namorada?</p>

<button class="sim" onclick="resp('SIM ❤️')">Sim</button>

<button class="nao" onclick="resp('NÃO 😅')">Não</button>

</div>

</div>

<script>

/* CRIAR ESTRELAS */

for(let i=0;i<160;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDuration=(5+Math.random()*10)+"s";

document.body.appendChild(s);

}

/* LOGIN */

function entrar(){

let senha=document.getElementById("senha").value;

if(senha==="amor"){

document.getElementById("login").style.display="none";
document.getElementById("book").style.display="block";

}else{

alert("Senha errada ❤️");

}

}

/* VIRAR PÁGINA */

function virar(){

document.getElementById("p1").classList.add("flipped");

}

/* WHATSAPP */

function resp(r){

let numero="960277821";

let msg="Oi amor ❤️ minha resposta é "+r;

window.location.href="https://wa.me/"+numero+"?text="+encodeURIComponent(msg);

}

</script>

</body>
</html>
